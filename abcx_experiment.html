    gap: 16px;
    margin: 24px 0;
  }
  .audio-cell {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .audio-cell label {
    display: block;
    font-size: 1.1em;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .audio-cell audio {
    width: 100%;
  }
  .choice-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 24px;
  }
  .choice-btn {
    padding: 12px 28px;
    font-size: 1em;
    border: 2px solid #333;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    transition: background 0.15s;
  }
  .choice-btn:hover { background: #e0e0e0; }
  .choice-btn.selected { background: #1a73e8; color: white; border-color: #1a73e8; }
  .block-header {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 0.95em;
  }

// ── Manual data collection (more reliable than jsPsych's data system) ─────────
const results = [];
const questionnaire = {};

function buildCSV() {
  const hdr = "music_years,headphones,comments,excerpt,snr_tag,x_condition," +
              "response_label,chose_condition,correct,rt_ms,gan_as_real,fluid_as_real";
  const rows = results.map(r => [
    questionnaire.music_years || "",
    '"' + (questionnaire.headphones || "").replace(/"/g,'""') + '"',
    '"' + (questionnaire.comments  || "").replace(/"/g,'""') + '"',
    r.excerpt, r.snr_tag, r.x_condition,
    r.response_label, r.chose_condition, r.correct,
    r.rt, r.gan_as_real, r.fluid_as_real
  ].join(","));
  return [hdr, ...rows].join("\n");
}

function downloadCSV() {
  const csv = buildCSV();
  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  document.body.appendChild(a);
  a.href = URL.createObjectURL(blob);
  a.download = "abcx_noise_results_" + Date.now() + ".csv";
  a.click();
  document.body.removeChild(a);
}

// ── Screens ──────────────────────────────────────────────────────────────────

const welcome = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Piano Synthesis Listening Test</h2>
    <p style="max-width:600px;margin:auto">
      In this test you will hear four piano recordings on each page:
      <strong>A</strong>, <strong>B</strong>, <strong>C</strong>, and <strong>X</strong>.
      <br><br>
      A, B, and C are labelled examples. X is a mystery recording — identical to one of A, B, or C.
      <br><br>
      Your task: <em>decide which of A, B, or C sounds most like X.</em>
      <br><br>
      You may replay any recording as many times as you like. There are no right or wrong answers.
      <br><br>
      Use <strong>headphones</strong> and set a comfortable listening volume.
    </p>`,
  choices: ["Begin →"],
};

const equipment_check = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Equipment Check</h3>
    <p>Please confirm the following before continuing:</p>
    <ul style="text-align:left;max-width:400px;margin:auto">
      <li>You are wearing <strong>headphones</strong></li>
      <li>If your headphones have an EQ/enhancement app, it is <strong>disabled</strong></li>
      <li>Your volume is set to a comfortable level</li>
    </ul>`,
  choices: ["I'm ready →"],
};

const practice_intro = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Practice Trial</h3>
    <p>The next trial is for practice. Your answer will <strong>not</strong> be recorded.</p>`,
  choices: ["Start practice →"],
};

const test_intro = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Main Test — Clean Audio</h3>
    <p>The practice is complete. The main test will now begin.</p>
    <p>There are <strong>15</strong> trials in total,
       split across 5 blocks with short breaks in between.</p>`,
  choices: ["Start test →"],
};

function makeBreakScreen(blockLabel) {
  const volumeWarning = blockLabel.includes('-15')
    ? `<p style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:12px 16px;margin-top:16px;">
        <strong>⚠️ Volume warning:</strong> The next block has very loud background noise.
        Please lower your volume before continuing.
       </p>`
    : '';
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h3>Short Break</h3>
      <p>Take 2–3 minutes to rest.</p>
      <p>The next block is: <strong>${blockLabel}</strong></p>
      ${volumeWarning}`,
    choices: ["Continue →"],
  };
}

// ── ABCX trial ────────────────────────────────────────────────────────────────

function makeTrialTimeline(trialData, isPractice) {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
      const snrNote = trialData.snr_tag === "clean"
        ? ""
        : `<div class="block-header">Background noise has been added to all four recordings in this block.</div>`;
      return `
        ${snrNote}
        <p style="color:#666;font-size:0.85em">
          ${isPractice ? "PRACTICE — not recorded" : ""}
          Excerpt: ${trialData.excerpt}
        </p>
        <div class="audio-grid">
          <div class="audio-cell">
            <label>A — FluidSynth</label>
            <audio controls src="${trialData.audio_A}"></audio>
          </div>
          <div class="audio-cell">
            <label>B — GAN Generated</label>
            <audio controls src="${trialData.audio_B}"></audio>
          </div>
          <div class="audio-cell">
            <label>C — Real Piano</label>
            <audio controls src="${trialData.audio_C}"></audio>
          </div>
          <div class="audio-cell" style="background:#e8f0fe;border:2px solid #1a73e8">
            <label>X — Which is this?</label>
            <audio controls src="${trialData.audio_X}"></audio>
          </div>
        </div>
        <p><strong>X sounds most like:</strong></p>`;
    },
    choices: ["A — FluidSynth", "B — GAN Generated", "C — Real Piano"],
    on_finish: function(data) {
      if (isPractice) return;
      const chosen = ["fluidsynth", "generated", "original"][data.response];
      results.push({
        excerpt:        trialData.excerpt,
        snr_tag:        trialData.snr_tag,
        x_condition:    trialData.x_condition,
        response_label: ["A","B","C"][data.response],
        chose_condition: chosen,
        correct:        chosen === trialData.x_condition,
        rt:             Math.round(data.rt),
        gan_as_real:    trialData.x_condition === "generated"  && chosen === "original",
        fluid_as_real:  trialData.x_condition === "fluidsynth" && chosen === "original",
      });
    },
  };
}

// ── Build full timeline ───────────────────────────────────────────────────────

const timeline = [welcome, equipment_check];

const practiceTrialData = allBlocks[0].trials[0];
timeline.push(practice_intro);
timeline.push(makeTrialTimeline(practiceTrialData, true));
timeline.push(test_intro);

allBlocks.forEach(function(blockObj, blockIdx) {
  if (blockIdx > 0) {
    timeline.push(makeBreakScreen(blockObj.block.label));
  }
  blockObj.trials.forEach(function(trialData) {
    timeline.push(makeTrialTimeline(trialData, false));
  });
});

// Post-session questionnaire (captures into questionnaire object)
timeline.push({
  type: jsPsychSurveyText,
  questions: [
    { prompt: "How many years of music training do you have? (0 if none)", name: "music_years", required: true },
    { prompt: "What headphones did you use?", name: "headphones", required: true },
    { prompt: "Any comments about the test?", name: "comments", rows: 3 },
  ],
  on_finish: function(data) {
    const r = data.response || {};
    questionnaire.music_years = r.music_years || "";
    questionnaire.headphones  = r.headphones  || "";
    questionnaire.comments    = r.comments    || "";
    downloadCSV();
  },
});

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div style="text-align:center;padding:40px 20px;">
      <h2 style="color:#2e7d32;">✓ Thank you!</h2>
      <p>Your results CSV should have downloaded automatically.<br>
         If not, click the button below.</p>
      <button onclick="downloadCSV()"
        style="padding:14px 32px;font-size:1.1em;background:#1a73e8;color:white;
               border:none;border-radius:6px;cursor:pointer;margin:16px 0;">
        Download Results CSV
      </button>
      <p style="margin-top:24px;">Please <strong>email the CSV</strong> to:
         <a href="mailto:2664688k@student.gla.ac.uk">2664688k@student.gla.ac.uk</a></p>
      <p>Then return to the study page to complete the next test.</p>
    </div>`,
  choices: [],
});

jsPsych.run(timeline);
