<style>
  .audio-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 24px 0;
  }
  .audio-cell {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .audio-cell label {
    display: block;
    font-size: 1.1em;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .audio-cell audio {
    width: 100%;
  }
  .choice-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 24px;
  }
  .choice-btn {
    padding: 12px 28px;
    font-size: 1em;
    border: 2px solid #333;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    transition: background 0.15s;
  }
  .choice-btn:hover { background: #e0e0e0; }
  .choice-btn.selected { background: #1a73e8; color: white; border-color: #1a73e8; }
  .block-header {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 0.95em;
  }
</style>

// ── Screens ──────────────────────────────────────────────────────────────────

const welcome = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <h2>Piano Synthesis Listening Test</h2>
    <p style="max-width:600px;margin:auto">
      In this test you will hear four piano recordings on each page:
      <strong>A</strong>, <strong>B</strong>, <strong>C</strong>, and <strong>X</strong>.
      <br><br>
      A, B, and C are labelled examples. X is a mystery recording — identical to one of A, B, or C.
      <br><br>
      Your task: <em>decide which of A, B, or C sounds most like X.</em>
      <br><br>
      You may replay any recording as many times as you like. There are no right or wrong answers.
      <br><br>
      Use <strong>wired headphones</strong> and set a comfortable listening volume.
    </p>
    <p style="margin-top:32px"><em>Press any key to begin.</em></p>`,
  post_trial_gap: 500,
};

const equipment_check = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <h3>Equipment Check</h3>
    <p>Please confirm the following before continuing:</p>
    <ul style="text-align:left;max-width:400px;margin:auto">
      <li>You are wearing <strong>wired headphones</strong> (not Bluetooth)</li>
      <li>If your headphones have an EQ/enhancement app, it is <strong>disabled</strong></li>
      <li>Your volume is set to a comfortable level</li>
    </ul>
    <p style="margin-top:24px"><em>Press any key when ready.</em></p>`,
};

const practice_intro = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <h3>Practice Trial</h3>
    <p>The next trial is for practice. Your answer will <strong>not</strong> be recorded.</p>
    <p><em>Press any key to begin the practice.</em></p>`,
};

const test_intro = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <h3>Main Test — Clean Audio</h3>
    <p>The practice is complete. The main test will now begin.</p>
    <p>There are <strong>75</strong> trials in total,
       split across 5 blocks with short breaks in between.</p>
    <p><em>Press any key to start.</em></p>`,
};

function makeBreakScreen(blockLabel) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h3>Short Break</h3>
      <p>Take 2–3 minutes to rest.</p>
      <p>The next block is: <strong>${blockLabel}</strong></p>
      <p><em>Press any key when you are ready to continue.</em></p>`,
  };
}

// ── ABCX trial ────────────────────────────────────────────────────────────────

function makeTrialTimeline(trialData, isPractice) {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
      const snrNote = trialData.snr_tag === "clean"
        ? ""
        : `<div class="block-header">Background noise has been added to all four recordings in this block.</div>`;
      return `
        ${snrNote}
        <p style="color:#666;font-size:0.85em">
          ${isPractice ? "PRACTICE — not recorded" : ""}
          Excerpt: ${trialData.excerpt}
        </p>
        <div class="audio-grid">
          <div class="audio-cell">
            <label>A — FluidSynth</label>
            <audio controls src="${trialData.audio_A}"></audio>
          </div>
          <div class="audio-cell">
            <label>B — GAN Generated</label>
            <audio controls src="${trialData.audio_B}"></audio>
          </div>
          <div class="audio-cell">
            <label>C — Real Piano</label>
            <audio controls src="${trialData.audio_C}"></audio>
          </div>
          <div class="audio-cell" style="background:#e8f0fe;border:2px solid #1a73e8">
            <label>X — Which is this?</label>
            <audio controls src="${trialData.audio_X}"></audio>
          </div>
        </div>
        <p><strong>X sounds most like:</strong></p>`;
    },
    choices: ["A — FluidSynth", "B — GAN Generated", "C — Real Piano"],
    data: {
      excerpt:      trialData.excerpt,
      snr_tag:      trialData.snr_tag,
      x_condition:  trialData.x_condition,
      is_practice:  isPractice,
      task:         "abcx",
    },
    on_finish: function(data) {
      const chosen = ["fluidsynth", "generated", "original"][data.response];
      data.response_label  = ["A", "B", "C"][data.response];
      data.chose_condition = chosen;
      data.correct         = chosen === data.x_condition;
      // Key confusion cells for dissertation analysis
      data.gan_as_real     = (data.x_condition === "generated" && chosen === "original");
      data.fluid_as_real   = (data.x_condition === "fluidsynth" && chosen === "original");
    },
  };
}

// ── Build full timeline ───────────────────────────────────────────────────────

const timeline = [welcome, equipment_check];

// Practice trial (first trial from clean block, not recorded)
const practiceTrialData = allBlocks[0].trials[0];
timeline.push(practice_intro);
timeline.push(makeTrialTimeline(practiceTrialData, true));

timeline.push(test_intro);

allBlocks.forEach(function(blockObj, blockIdx) {
  if (blockIdx > 0) {
    timeline.push(makeBreakScreen(blockObj.block.label));
  }
  blockObj.trials.forEach(function(trialData) {
    timeline.push(makeTrialTimeline(trialData, false));
  });
});

// Post-session questionnaire
timeline.push({
  type: jsPsychSurveyText,
  questions: [
    { prompt: "How many years of music training do you have? (0 if none)", name: "music_years", required: true },
    { prompt: "What headphones did you use?", name: "headphones", required: true },
    { prompt: "Any comments about the test?", name: "comments", rows: 3 },
  ],
  data: { task: "post_questionnaire" },
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <h3>Thank you!</h3>
    <p>Your results have been saved automatically.</p>
    <p>You may now close this window.</p>`,
  trial_duration: null,
  response_ends_trial: false,
});

jsPsych.run(timeline);
